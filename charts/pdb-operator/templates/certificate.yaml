{{- if and .Values.webhooks.enabled .Values.certManager.enabled }}
{{- if .Values.certManager.selfSigned }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "pdb-operator.fullname" . }}-selfsigned-issuer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pdb-operator.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "pdb-operator.fullname" . }}-serving-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pdb-operator.labels" . | nindent 4 }}
  {{- with .Values.certManager.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  dnsNames:
    - {{ include "pdb-operator.webhookServiceName" . }}.{{ .Release.Namespace }}.svc
    - {{ include "pdb-operator.webhookServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    {{- if .Values.certManager.selfSigned }}
    kind: Issuer
    name: {{ include "pdb-operator.fullname" . }}-selfsigned-issuer
    {{- else }}
    kind: {{ .Values.certManager.issuerKind }}
    name: {{ .Values.certManager.issuerName }}
    {{- end }}
  secretName: {{ include "pdb-operator.webhookCertSecretName" . }}
  {{- with .Values.certManager.duration }}
  duration: {{ . }}
  {{- end }}
  {{- with .Values.certManager.renewBefore }}
  renewBefore: {{ . }}
  {{- end }}
{{- end }}
