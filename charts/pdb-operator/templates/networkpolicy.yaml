{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pdb-operator.fullname" . }}-allow-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pdb-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pdb-operator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.namespaceSelector | nindent 12 }}
      ports:
        - port: {{ .Values.metrics.service.port }}
          protocol: TCP
{{- end }}
