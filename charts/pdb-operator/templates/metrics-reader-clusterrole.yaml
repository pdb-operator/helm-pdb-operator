{{- if .Values.metrics.service.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "pdb-operator.fullname" . }}-metrics-reader
  labels:
    {{- include "pdb-operator.labels" . | nindent 4 }}
rules:
  - nonResourceURLs:
      - /metrics
    verbs:
      - get
{{- end }}
