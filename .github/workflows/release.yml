name: Release
on:
  push:
    tags: ["v*"]
permissions: {}
jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      - run: helm lint charts/pdb-operator

  unittest:
    name: Helm Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      - name: Install helm-unittest plugin
        run: helm plugin install --verify=false --version v1.0.3 https://github.com/helm-unittest/helm-unittest.git
      - run: helm unittest charts/pdb-operator

  release:
    name: Package & Publish
    needs: [lint, unittest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Log in to GHCR
        run: echo "$GITHUB_TOKEN" | helm registry login ghcr.io -u "$GH_ACTOR" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}

      - name: Package chart
        run: helm package charts/pdb-operator --destination .cr-release-packages

      - name: Push to OCI registry
        run: helm push .cr-release-packages/*.tgz oci://ghcr.io/pdb-operator/charts

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found" CHANGELOG.md > release-notes.md

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2
        with:
          body_path: release-notes.md
          generate_release_notes: false
