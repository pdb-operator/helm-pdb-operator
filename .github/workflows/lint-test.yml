name: Lint & Test
on:
  push:
    branches: [main]
    paths:
      - "charts/**"
      - ".github/workflows/lint-test.yml"
  pull_request:
    paths:
      - "charts/**"
      - ".github/workflows/lint-test.yml"
permissions:
  contents: read
jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - run: helm lint charts/pdb-operator

  chart-testing-lint:
    name: Chart Testing Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"
      - uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2
      - name: Run chart-testing lint
        run: ct lint --target-branch "$DEFAULT_BRANCH" --charts charts/pdb-operator
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

  unittest:
    name: Helm Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: Install helm-unittest plugin
        run: helm plugin install --verify=false https://github.com/helm-unittest/helm-unittest.git
      - run: helm unittest charts/pdb-operator
