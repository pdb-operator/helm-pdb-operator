name: Lint & Test
on:
  push:
    branches: [main]
    paths:
      - "charts/**"
      - ".github/workflows/lint-test.yml"
  pull_request:
    paths:
      - "charts/**"
      - ".github/workflows/lint-test.yml"
permissions:
  contents: read
jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      - run: helm lint charts/pdb-operator

  chart-testing-lint:
    name: Chart Testing Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2
      - name: Run chart-testing lint
        run: ct lint --target-branch "$DEFAULT_BRANCH" --charts charts/pdb-operator
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

  unittest:
    name: Helm Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      - name: Install helm-unittest plugin
        run: helm plugin install --verify=false --version v1.0.3 https://github.com/helm-unittest/helm-unittest.git
      - run: helm unittest charts/pdb-operator
